  # ==================== 发布 Release（仅 tag 时触发）====================
  create-release:
    name: Create GitHub Release
    needs:
      - build-windows-executer
      - build-windows-installer
      - build-linux-executer
      - build-linux-installer
      - build-macos-arm64-executer
      - build-macos-arm64-installer
      - build-macos-x64-executer
      - build-macos-x64-installer
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: false

      - name: Prepare release files
        run: |
          echo "Preparing release files..."
          find release-artifacts -type f \( -name "*.zip" -o -name "*.exe" \) | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenHarmony Scrcpy ${{ github.ref_name }}
          body: |
            ## OpenHarmony Scrcpy ${{ github.ref_name }}
            
            ### Downloads
            
            | Type | Platform | Architecture | File |
            |------|----------|-------------|------|
            | Executer | Windows | x64 | `OHScrcpy_Exec_Windows_x64_*.zip` |
            | Executer | Linux | x64 | `OHScrcpy_Exec_Linux_x64_*.zip` |
            | Executer | macOS | arm64 (M1/M2/M3) | `OHScrcpy_Exec_macOS_arm64_*.zip` |
            | Executer | macOS | x64 (Intel) | `OHScrcpy_Exec_macOS_x64_*.zip` |
            | Installer | Windows | x64 | `OHScrcpy_Setup_Windows_x64_*.exe` |
            | Installer | Linux | x64 | `OHScrcpy_Setup_Linux_x64_*.zip` |
            | Installer | macOS | arm64 | `OHScrcpy_Setup_macOS_arm64_*.zip` |
            | Installer | macOS | x64 | `OHScrcpy_Setup_macOS_x64_*.zip` |
            
            ### Executer (单文件)
            
            Portable executable, no installation required:
            1. Download and extract the ZIP
            2. Run `OHScrcpy` directly
            
            ### Installer (安装包)
            
            Installation required:
            1. Windows: Double-click `OHScrcpy_Setup_*.exe`
            2. Linux/macOS: Extract ZIP, run `install_ohscrcpy.sh`
            
            ### Features
            
            - OpenHarmony device screen mirroring
            - Support rk3568 / rk3588 / HarmonyOS devices
            - Real-time H.264/H.265 video streaming
            
          files: |
            release-artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}