name: Build OpenHarmony OHScrcpy Multi-Platform

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== 测试阶段 ====================
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  # ==================== Executer 构建（Matrix）====================
  build-executer:
    name: Build Executer (${{ matrix.platform }}-${{ matrix.arch }})
    needs: test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            arch: x64
            ext: .exe
          - os: ubuntu-latest
            platform: Linux
            arch: x64
            ext: ''
          - os: macos-latest
            platform: macOS
            arch: arm64
            ext: ''
          - os: macos-13
            platform: macOS
            arch: x64
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Client/requirements.txt

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev libavutil-dev

      - name: Install FFmpeg (macOS)
        if: matrix.platform == 'macOS'
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Build Executer (Windows)
        if: matrix.platform == 'Windows'
        shell: cmd
        run: |
          cd Package
          call build_executer.bat

      - name: Build Executer (Linux/macOS)
        if: matrix.platform != 'Windows'
        run: |
          cd Package
          chmod +x build_executer.sh
          ./build_executer.sh

      - name: Test executable
        shell: bash
        run: |
          EXE_PATH="Package/Executer/output/${{ matrix.platform }}/${{ matrix.arch }}/OHScrcpy${{ matrix.ext }}"
          if [ -f "$EXE_PATH" ]; then
            echo "Testing executable at: $EXE_PATH"
            chmod +x "$EXE_PATH" 2>/dev/null || true
            "$EXE_PATH" --help 2>&1 | head -10 || true
            echo "Executable test completed"
          else
            echo "::error::Executable not found at $EXE_PATH"
            ls -la "Package/Executer/output/${{ matrix.platform }}/${{ matrix.arch }}/" || true
            exit 1
          fi

      - name: Upload Executer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Executer-${{ matrix.platform }}-${{ matrix.arch }}
          path: Package/Executer/output/${{ matrix.platform }}/${{ matrix.arch }}/
          retention-days: 30
          if-no-files-found: error

  # ==================== Installer 构建（Matrix）====================
  build-installer:
    name: Build Installer (${{ matrix.platform }}-${{ matrix.arch }})
    needs: test
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            arch: x64
            ext: .exe
          - os: ubuntu-latest
            platform: Linux
            arch: x64
            ext: ''
          - os: macos-latest
            platform: macOS
            arch: arm64
            ext: ''
          - os: macos-13
            platform: macOS
            arch: x64
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Client/requirements.txt

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev libavutil-dev

      - name: Install FFmpeg (macOS)
        if: matrix.platform == 'macOS'
        run: brew install ffmpeg

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'Windows'
        run: choco install innosetup -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Build Installer (Windows)
        if: matrix.platform == 'Windows'
        shell: cmd
        run: |
          cd Package
          call build_installer.bat

      - name: Build Installer (Linux/macOS)
        if: matrix.platform != 'Windows'
        run: |
          cd Package
          chmod +x build_installer.sh
          ./build_installer.sh

      - name: Test installer executable
        shell: bash
        run: |
          EXE_PATH="Package/Installer/dist/OHScrcpy/OHScrcpy${{ matrix.ext }}"
          if [ -f "$EXE_PATH" ]; then
            echo "Testing installer executable at: $EXE_PATH"
            chmod +x "$EXE_PATH" 2>/dev/null || true
            "$EXE_PATH" --help 2>&1 | head -10 || true
            echo "Installer executable test completed"
          else
            echo "::error::Installer executable not found at $EXE_PATH"
            ls -la "Package/Installer/dist/OHScrcpy/" || true
            exit 1
          fi

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: Package/Installer/output/${{ matrix.platform }}/${{ matrix.arch }}/
          retention-days: 30
          if-no-files-found: error

  # ==================== 发布 Release（仅 tag 时触发）====================
  create-release:
    name: Create GitHub Release
    needs:
      - build-executer
      - build-installer
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenHarmony Scrcpy ${{ github.ref_name }}
          files: |
            release-artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 失败通知 ====================
  notify-on-failure:
    name: Notify on CI Failure
    needs: [build-executer, build-installer]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failed: ${context.workflow} - ${context.ref}`,
              body: `
                ## CI Build Failed

                **Workflow**: ${context.workflow}
                **Branch/Tag**: ${context.ref}
                **Run URL**: ${context.serverUrl}/${context.repository}/actions/runs/${context.runId}
                **Triggered by**: ${context.actor}

                Please investigate the failure.
              `,
              labels: ['ci-failed', 'automated']
            })
