name: Build OHScrcpy Multi-Platform

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ==================== 测试阶段 ====================
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  # ==================== Windows x64 - Executer 构建 ====================
  build-windows-executer:
    name: Build Windows Executer x64
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Build Executer
        run: |
          cd Package
          call build_executer.bat

      - name: Test executable
        run: |
          $exePath = "Package\Executer\output\Windows\x64\OHScrcpy.exe"
          if (Test-Path $exePath) {
            Write-Host "Testing executable..."
            & $exePath --help 2>&1 | Select-Object -First 10
            Write-Host "Executable test completed"
          } else {
            Write-Error "Executable not found at $exePath"
            exit 1
          }

      - name: Upload Windows Executer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Executer-Windows-x64
          path: Package/Executer/output/Windows/x64/
          retention-days: 30
          if-no-files-found: error

  # ==================== Windows x64 - Installer 构建 ====================
  build-windows-installer:
    name: Build Windows Installer x64
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Build Installer (skip pause in CI)
        run: |
          cd Package
          # Set NO_PAUSE and call the script
          $env:NO_PAUSE = "1"
          # Skip the interactive pause step by directly calling sub-scripts
          cd Installer
          call prepare_for_installer.bat
          call make_ohscrcpy_executer_onedir.bat
          # Call ISCC directly to skip the pause in make_ohscrcpy_installer.bat
          $arch = "x64"
          $version = "v2.1.0"
          ISCC.exe /Qp /O".\output\Windows\$arch" /F"OHScrcpy_Setup_Windows_$arch_$version" ohscrcpy_setup.iss
          cd ..

      - name: Test installer executable
        run: |
          $exePath = "Package\Installer\dist\OHScrcpy\OHScrcpy.exe"
          if (Test-Path $exePath) {
            Write-Host "Testing installer executable..."
            & $exePath --help 2>&1 | Select-Object -First 10
            Write-Host "Installer executable test completed"
          } else {
            Write-Error "Installer executable not found"
            exit 1
          }

      - name: Upload Windows Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Installer-Windows-x64
          path: Package/Installer/output/Windows/x64/
          retention-days: 30
          if-no-files-found: error

  # ==================== Linux x64 - Executer 构建 ====================
  build-linux-executer:
    name: Build Linux Executer x64
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (FFmpeg for PyAV)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev libavutil-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Build Executer
        run: |
          cd Package
          chmod +x build_executer.sh
          ./build_executer.sh

      - name: Test executable
        run: |
          exePath="Package/Executer/output/Linux/x64/OHScrcpy"
          if [ -f "$exePath" ]; then
            echo "Testing executable..."
            chmod +x "$exePath"
            "$exePath" --help 2>&1 | head -10 || true
            echo "Executable test completed"
          else
            echo "Error: Executable not found"
            exit 1
          fi

      - name: Upload Linux Executer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Executer-Linux-x64
          path: Package/Executer/output/Linux/x64/
          retention-days: 30
          if-no-files-found: error

  # ==================== Linux x64 - Installer 构建 ====================
  build-linux-installer:
    name: Build Linux Installer x64
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev libavutil-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Build Installer
        run: |
          cd Package
          chmod +x build_installer.sh
          ./build_installer.sh

      - name: Test installer executable
        run: |
          exePath="Package/Installer/dist/OHScrcpy/OHScrcpy"
          if [ -f "$exePath" ]; then
            echo "Testing installer executable..."
            chmod +x "$exePath"
            "$exePath" --help 2>&1 | head -10 || true
            echo "Installer executable test completed"
          else
            echo "Error: Installer executable not found"
            exit 1
          fi

      - name: Upload Linux Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Installer-Linux-x64
          path: Package/Installer/output/Linux/x64/
          retention-days: 30
          if-no-files-found: error

  # ==================== macOS arm64 - Executer 构建 ====================
  build-macos-arm64-executer:
    name: Build macOS Executer arm64
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Generate macOS icon (.icns)
        run: |
          cd Package/Executer
          python3 << 'EOF'
          from PIL import Image
          img = Image.open('app.ico')
          img.save('icon_512.png', 'PNG')
          print(f"Extracted icon size: {img.size}")
          EOF
          mkdir -p icon.iconset
          sips -z 16 16     icon_512.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon_512.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon_512.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon_512.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon_512.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon_512.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon_512.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon_512.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon_512.png --out icon.iconset/icon_512x512.png
          cp icon_512.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o app.icns
          rm -rf icon.iconset icon_512.png

      - name: Build Executer
        run: |
          cd Package
          chmod +x build_executer.sh
          ./build_executer.sh

      - name: Test executable
        run: |
          exePath="Package/Executer/output/macOS/arm64/OHScrcpy"
          if [ -f "$exePath" ]; then
            echo "Testing executable..."
            chmod +x "$exePath"
            "$exePath" --help 2>&1 | head -10 || true
            echo "Executable test completed"
          else
            echo "Error: Executable not found"
            exit 1
          fi

      - name: Upload macOS arm64 Executer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Executer-macOS-arm64
          path: Package/Executer/output/macOS/arm64/
          retention-days: 30
          if-no-files-found: error

  # ==================== macOS arm64 - Installer 构建 ====================
  build-macos-arm64-installer:
    name: Build macOS Installer arm64
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Client/requirements.txt
          pip install pyinstaller

      - name: Generate macOS icon (.icns) for Installer
        run: |
          cd Package/Installer
          cp ../Executer/app.ico resources/app.ico || true
          python3 << 'EOF'
          from PIL import Image
          import os
          icon_path = 'resources/app.ico'
          if os.path.exists(icon_path):
            img = Image.open(icon_path)
            img.save('icon_512.png', 'PNG')
          EOF
          if [ -f icon_512.png ]; then
            mkdir -p icon.iconset
            sips -z 16 16 icon_512.png --out icon.iconset/icon_16x16.png
            sips -z 32 32 icon_512.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32 icon_512.png --out icon.iconset/icon_32x32.png
            sips -z 64 64 icon_512.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128 icon_512.png --out icon.iconset/icon_128x128.png
            sips -z 256 256 icon_512.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256 icon_512.png --out icon.iconset/icon_256x256.png
            sips -z 512 512 icon_512.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512 icon_512.png --out icon.iconset/icon_512x512.png
            cp icon_512.png icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o resources/app.icns
            rm -rf icon.iconset icon_512.png
          fi

      - name: Build Installer
        run: |
          cd Package
          chmod +x build_installer.sh
          ./build_installer.sh

      - name: Test installer executable
        run: |
          exePath="Package/Installer/dist/OHScrcpy/OHScrcpy"
          if [ -f "$exePath" ]; then
            echo "Testing installer executable..."
            chmod +x "$exePath"
            "$exePath" --help 2>&1 | head -10 || true
            echo "Installer executable test completed"
          else
            echo "Error: Installer executable not found"
            exit 1
          fi

      - name: Upload macOS arm64 Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OHScrcpy-Installer-macOS-arm64
          path: Package/Installer/output/macOS/arm64/
          retention-days: 30
          if-no-files-found: error

  # ==================== macOS x64 - Executer 构建 ====================
  build-macos-x64-executer:
