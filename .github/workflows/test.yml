name: Test OpenHarmony OHScrcpy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            Client/requirements.txt
            tests/requirements-test.txt

      - name: Install system dependencies (FFmpeg for PyAV)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev libavutil-dev

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r Client/requirements.txt

      - name: Run pytest with coverage
        run: pytest tests/ -v --tb=short --cov=Client --cov-report=term-missing

      - name: Run type check (mypy)
        run: mypy Client/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # 类型检查不阻断构建，项目仍在逐步完善类型注解
