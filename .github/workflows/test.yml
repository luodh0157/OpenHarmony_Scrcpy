name: Test OpenHarmony OHScrcpy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:  # 允许 build.yml 调用

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (FFmpeg for PyAV)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-dev libavformat-dev

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r Client/requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Run type check (mypy)
        run: mypy Client/ --ignore-missing-imports --no-error-summary
        continue-on-error: true